<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>MecaniMóvil — Iniciando sesión…</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      html,body{margin:0;padding:0;height:100%;background:#0A0B0D;color:#fff;
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
      .wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
        height:100%;text-align:center;padding:24px;}
      .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.18);
        border-top-color:#0052FF;border-radius:50%;animation:spin .9s linear infinite;
        margin-bottom:18px;}
      @keyframes spin{to{transform:rotate(360deg);}}
      h1{font-size:16px;font-weight:600;margin:0 0 6px;}
      p{font-size:13px;opacity:.7;margin:0;}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="spinner"></div>
      <h1>Iniciando sesión con Google…</h1>
      <p>Esto se cerrará automáticamente.</p>
    </div>
    <script>
      (function () {
        try {
          var hash = window.location.hash || '';
          var search = window.location.search || '';
          var payload = { type: 'mecanimovil:google-oauth', hash: hash, search: search };

          if (window.opener && !window.opener.closed) {
            // Restringir al origin del opener si lo conocemos.
            var targetOrigin = window.location.origin;
            try {
              window.opener.postMessage(payload, targetOrigin);
            } catch (e) {
              window.opener.postMessage(payload, '*');
            }
          }
        } catch (e) {
          // ignore
        }
        // Cerrar siempre — el opener ya recibió el evento.
        setTimeout(function () { try { window.close(); } catch (e) {} }, 300);
      })();
    </script>
  </body>
</html>

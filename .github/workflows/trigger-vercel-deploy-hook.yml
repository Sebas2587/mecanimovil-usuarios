# Deploy en Vercel vía Deploy Hook (no requiere VERCEL_TOKEN en GitHub).
name: Deploy to Vercel (usuarios)
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        run: |
          curl -fsS -X POST \
            "https://api.vercel.com/v1/integrations/deploy/prj_onu4rpYmXcplOPOmS29auXoG4kZj/ppYbhmkdgZ" \
            -H "Content-Type: application/json"

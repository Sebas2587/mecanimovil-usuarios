# Build y deploy real en Vercel en cada push a main (no deploy hook: sin Git conectado cancelaba el build).
name: Deploy to Vercel (usuarios)
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_Ku9TorGrXCybLMQ8aYsGujdf
      VERCEL_PROJECT_ID: prj_onu4rpYmXcplOPOmS29auXoG4kZj
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN no definido en GitHub Secrets."
            exit 1
          fi
          npx vercel@53.2.0 deploy --prod --yes --token "$VERCEL_TOKEN"

# Dispara el Deploy Hook de Vercel en cada push a main.
# URL definida en package.json → deploy:vercel:hook (no requiere secret en GitHub).
name: Trigger Vercel deploy hook
on:
  push:
    branches: [main]

jobs:
  deploy-hook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: POST deploy hook (mecanimovil-usuarios)
        run: npm run deploy:vercel:hook
